syntax = "proto3";

option go_package = "github.com/luckysxx/common/proto/auth";

package user;

message LoginRequest {
    string username = 1;
    string password = 2;
    string app_code = 3;
    string device_id = 4;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    int64 user_id = 3;
    string username = 4;
}

message RefreshTokenRequest {
    string token = 1;
}

message RefreshTokenResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LogoutRequest {
    string device_id = 1;
}

message LogoutResponse {
    bool success = 1;
}

message VerifyTokenRequest {
    string token = 1;
}

message VerifyTokenResponse {
    int64 user_id = 1;
    string username = 2;
}

message SendPhoneCodeRequest {
    string phone = 1;
    string scene = 2;
}

message SendPhoneCodeResponse {
    string action = 1;
    int32 cooldown_seconds = 2;
    string message = 3;
    string debug_code = 4;
}

message PhoneAuthEntryRequest {
    string phone = 1;
    string verification_code = 2;
    string app_code = 3;
    string device_id = 4;
}

message PhoneAuthEntryResponse {
    string action = 1;
    string access_token = 2;
    string refresh_token = 3;
    int64 user_id = 4;
    string username = 5;
    string email = 6;
    string phone = 7;
    bool should_bind_email = 8;
    string message = 9;
}

message PhonePasswordLoginRequest {
    string phone = 1;
    string password = 2;
    string app_code = 3;
    string device_id = 4;
}

message PhonePasswordLoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    int64 user_id = 3;
    string username = 4;
    string phone = 5;
    string message = 6;
}

service AuthService {
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
    rpc Logout (LogoutRequest) returns (LogoutResponse);
    rpc VerifyToken (VerifyTokenRequest) returns (VerifyTokenResponse);
    rpc SendPhoneCode (SendPhoneCodeRequest) returns (SendPhoneCodeResponse);
    rpc PhoneAuthEntry (PhoneAuthEntryRequest) returns (PhoneAuthEntryResponse);
    rpc PhonePasswordLogin (PhonePasswordLoginRequest) returns (PhonePasswordLoginResponse);
}
