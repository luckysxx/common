syntax = "proto3";

option go_package = "github.com/luckysxx/common/proto/user";

package user;

message RegisterRequest {
    string email = 1;
    string username = 2;
    string password = 3;
}

message RegisterResponse {
    int64 user_id = 1;
    string username = 2;
}

service UserService {
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc GetProfile (GetProfileRequest) returns (ProfileResponse);
    rpc UpdateProfile (UpdateProfileRequest) returns (ProfileResponse);
}

message GetProfileRequest {
    int64 user_id = 1;
}

message UpdateProfileRequest {
    int64 user_id = 1;
    string nickname = 2;
    string avatar_url = 3;
    string bio = 4;
    string birthday = 5;
}

message ProfileResponse {
    int64 user_id = 1;
    string nickname = 2;
    string avatar_url = 3;
    string bio = 4;
    string updated_at = 5;
    string birthday = 6;
}
