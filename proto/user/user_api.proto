syntax = "proto3";

option go_package = "github.com/luckysxx/common/proto/user";

package user;

message RegisterRequest {
    string email = 1;
    string username = 2;
    string password = 3;
}

message RegisterResponse {
    int64 user_id = 1;
    string username = 2;
}

service UserService {
    rpc Register (RegisterRequest) returns (RegisterResponse);
}