syntax = "proto3";

option go_package = "github.com/luckysxx/common/proto/note";

package note;

import "google/api/annotations.proto";

service NoteService {
    // ── 核心片段 CRUD ──

    rpc ListSnippets (ListSnippetsRequest) returns (ListSnippetsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/me/snippets"
        };
    }

    rpc CreateSnippet (CreateSnippetRequest) returns (SnippetResponse) {
        option (google.api.http) = {
            post: "/api/v1/notes/snippets"
            body: "*"
        };
    }

    rpc GetSnippet (GetSnippetRequest) returns (SnippetResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/snippets/{snippet_id}"
        };
    }

    rpc UpdateSnippet (UpdateSnippetRequest) returns (SnippetResponse) {
        option (google.api.http) = {
            put: "/api/v1/notes/snippets/{snippet_id}"
            body: "*"
        };
    }

    rpc DeleteSnippet (DeleteSnippetRequest) returns (DeleteSnippetResponse) {
        option (google.api.http) = {
            delete: "/api/v1/notes/snippets/{snippet_id}"
        };
    }

    rpc SearchSnippets (SearchSnippetsRequest) returns (ListSnippetsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/snippets/search"
        };
    }

    // 公开片段 — 不加 http 注解，保留手写 handler（无需鉴权）
    rpc GetPublicSnippet (GetPublicSnippetRequest) returns (SnippetResponse);

    rpc FavoriteSnippet (FavoriteSnippetRequest) returns (FavoriteSnippetResponse) {
        option (google.api.http) = {
            post: "/api/v1/notes/snippets/{snippet_id}/favorite"
        };
    }

    rpc UnfavoriteSnippet (UnfavoriteSnippetRequest) returns (FavoriteSnippetResponse) {
        option (google.api.http) = {
            delete: "/api/v1/notes/snippets/{snippet_id}/favorite"
        };
    }

    rpc CreateSnippetFromTemplate (CreateSnippetFromTemplateRequest) returns (SnippetResponse) {
        option (google.api.http) = {
            post: "/api/v1/notes/snippets/from-template"
            body: "*"
        };
    }

    // ── 工作区列表 ──

    rpc ListRecentSnippets (ListSnippetsRequest) returns (ListSnippetsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/me/snippets/recent"
        };
    }

    rpc ListSharedSnippets (ListSnippetsRequest) returns (ListSnippetsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/me/snippets/shared"
        };
    }

    rpc ListFavoriteSnippets (ListSnippetsRequest) returns (ListSnippetsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/me/snippets/favorites"
        };
    }

    // ── 分组 ──

    rpc ListGroups (ListGroupsRequest) returns (ListGroupsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/groups"
        };
    }

    rpc CreateGroup (CreateGroupRequest) returns (GroupResponse) {
        option (google.api.http) = {
            post: "/api/v1/notes/groups"
            body: "*"
        };
    }

    rpc UpdateGroup (UpdateGroupRequest) returns (GroupResponse) {
        option (google.api.http) = {
            put: "/api/v1/notes/groups/{group_id}"
            body: "*"
        };
    }

    rpc DeleteGroup (DeleteGroupRequest) returns (DeleteGroupResponse) {
        option (google.api.http) = {
            delete: "/api/v1/notes/groups/{group_id}"
        };
    }

    // ── 标签 ──

    rpc ListTags (ListTagsRequest) returns (ListTagsResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/tags"
        };
    }

    rpc CreateTag (CreateTagRequest) returns (TagResponse) {
        option (google.api.http) = {
            post: "/api/v1/notes/tags"
            body: "*"
        };
    }

    rpc DeleteTag (DeleteTagRequest) returns (DeleteTagResponse) {
        option (google.api.http) = {
            delete: "/api/v1/notes/tags/{tag_id}"
        };
    }

    // ── 模板 ──

    rpc ListTemplates (ListTemplatesRequest) returns (ListTemplatesResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/templates"
        };
    }

    rpc GetTemplate (GetTemplateRequest) returns (TemplateResponse) {
        option (google.api.http) = {
            get: "/api/v1/notes/templates/{template_id}"
        };
    }

    // 文件上传 — 不加 http 注解，保留手写 handler（二进制流）
    rpc UploadFile (UploadFileRequest) returns (UploadFileResponse);
}

// ── 已有请求与响应 ──

message CreateSnippetRequest {
    string title = 1;
    string content = 2;
    string language = 3;
    string visibility = 4;
}

message GetSnippetRequest {
    int64 snippet_id = 1;
}

message ListSnippetsRequest {
}

message UpdateSnippetRequest {
    int64 snippet_id = 1;
    string title = 2;
    string content = 3;
    string language = 4;
    string visibility = 5;
}

message SnippetResponse {
    int64 id = 1;
    int64 owner_id = 2;
    string title = 3;
    string type = 4;
    string content = 5;
    string file_url = 6;
    int64 file_size = 7;
    string mime_type = 8;
    string language = 9;
    string visibility = 10;
    int64 group_id = 11;
    string created_at = 12;
    string updated_at = 13;
}

message ListSnippetsResponse {
    repeated SnippetResponse snippets = 1;
}

// ── 扩展请求与响应 ──

message DeleteSnippetRequest {
    int64 snippet_id = 1;
}
message DeleteSnippetResponse {
    int64 id = 1;
}

// SearchSnippetsRequest 结构化搜索请求（重设计）
message SearchSnippetsRequest {
    string keyword = 1;
    string language = 2;
    int32 limit = 3;
    int32 offset = 4;
}

message GetPublicSnippetRequest {
    int64 snippet_id = 1;
}

message FavoriteSnippetRequest {
    int64 snippet_id = 1;
}
message UnfavoriteSnippetRequest {
    int64 snippet_id = 1;
}
message FavoriteSnippetResponse {
    int64 snippet_id = 1;
    bool favorite = 2;
}

message CreateSnippetFromTemplateRequest {
    int64 template_id = 1;
    string title = 2;
    string visibility = 3;
}

// ── Group Messages ──
message GroupResponse {
    int64 id = 1;
    string name = 2;
}
message ListGroupsRequest {}
message ListGroupsResponse {
    repeated GroupResponse groups = 1;
}
message CreateGroupRequest {
    string name = 1;
}
message UpdateGroupRequest {
    int64 group_id = 1;
    string name = 2;
}
message DeleteGroupRequest {
    int64 group_id = 1;
}
message DeleteGroupResponse {
    int64 id = 1;
}

// ── Tag Messages ──
message TagResponse {
    int64 id = 1;
    string name = 2;
}
message ListTagsRequest {}
message ListTagsResponse {
    repeated TagResponse tags = 1;
}
message CreateTagRequest {
    string name = 1;
}
message DeleteTagRequest {
    int64 tag_id = 1;
}
message DeleteTagResponse {
    int64 id = 1;
}

// ── Template Messages ──
message TemplateResponse {
    string id = 1;
    string name = 2;
    string language = 3;
    string content = 4;
}
message ListTemplatesRequest {}
message ListTemplatesResponse {
    repeated TemplateResponse templates = 1;
}
message GetTemplateRequest {
    string template_id = 1;
}

// ── Upload ──
message UploadFileRequest {
    bytes file_data = 1;
    string filename = 2;
}
message UploadFileResponse {
    string id = 1;
    string filename = 2;
    int64 size = 3;
}
